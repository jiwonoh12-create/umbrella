<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="우산 알림">
<title>☂️ 우산 챙겨요?</title>
<link id="appIcon" rel="apple-touch-icon" href="">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    background: #0a1628;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }
  .bg-circle { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; pointer-events: none; }
  .bg-circle-1 { width: 400px; height: 400px; background: #4A90D9; top: -100px; left: -100px; }
  .bg-circle-2 { width: 300px; height: 300px; background: #1a5fa8; bottom: -50px; right: -80px; }
  .card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 36px 32px; width: 100%; max-width: 340px; text-align: center; backdrop-filter: blur(20px); position: relative; z-index: 1; }
  .location { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 28px; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .main-icon { font-size: 80px; margin-bottom: 16px; display: block; transition: all 0.5s ease; }
  .status-text { font-size: 22px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .sub-text { font-size: 14px; color: rgba(255,255,255,0.55); margin-bottom: 28px; line-height: 1.6; }
  .prob-ring { width: 120px; height: 120px; margin: 0 auto 24px; position: relative; }
  .prob-ring svg { transform: rotate(-90deg); }
  .prob-ring .track { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 8; }
  .prob-ring .fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
  .prob-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
  .prob-number { font-size: 28px; font-weight: 700; line-height: 1; }
  .prob-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .weather-row { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); border-radius: 16px; padding: 16px 12px; margin-bottom: 20px; }
  .weather-item { text-align: center; }
  .weather-item .wi-val { font-size: 15px; font-weight: 600; }
  .weather-item .wi-label { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 3px; }
  .refresh-btn { background: rgba(74,144,217,0.2); border: 1px solid rgba(74,144,217,0.4); color: #7ec8f5; border-radius: 14px; padding: 12px 28px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.2s; font-family: inherit; }
  .refresh-btn:active { transform: scale(0.97); background: rgba(74,144,217,0.3); }
  .loading { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #4A90D9; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: rgba(220,80,80,0.1); border: 1px solid rgba(220,80,80,0.3); border-radius: 14px; padding: 16px; font-size: 13px; color: #ffaaaa; margin-bottom: 16px; line-height: 1.6; }
  .update-time { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 12px; }
  .rain-yes .main-icon { animation: wiggle 1s ease-in-out infinite; }
  @keyframes wiggle { 0%,100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }
</style>
</head>
<body>
<div class="bg-circle bg-circle-1"></div>
<div class="bg-circle bg-circle-2"></div>
<div class="card" id="card">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="font-size:14px; color:rgba(255,255,255,0.5)">날씨 확인 중...</p>
  </div>
  <div id="result" style="display:none">
    <div class="location">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      송파구
    </div>
    <div class="main-icon" id="mainIcon">☂️</div>
    <div class="status-text" id="statusText">확인 중...</div>
    <div class="sub-text" id="subText"></div>
    <div class="prob-ring">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle class="track" cx="60" cy="60" r="52"/>
        <circle class="fill" id="ringFill" cx="60" cy="60" r="52" stroke="#4A90D9" stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
      </svg>
      <div class="prob-center">
        <div class="prob-number" id="probNum">-</div>
        <div class="prob-label">강수확률</div>
      </div>
    </div>
    <div class="weather-row" id="weatherRow"></div>
    <button class="refresh-btn" onclick="fetchWeather()">새로고침</button>
    <div class="update-time" id="updateTime"></div>
  </div>
  <div id="errorDiv" style="display:none">
    <div class="error-box" id="errorMsg"></div>
    <button class="refresh-btn" onclick="fetchWeather()">다시 시도</button>
  </div>
</div>

<script>
// 홈화면 아이콘 생성
const c = document.createElement('canvas');
c.width = 180; c.height = 180;
const ctx = c.getContext('2d');
ctx.fillStyle = '#ffffff';
ctx.beginPath();
ctx.roundRect(0, 0, 180, 180, 40);
ctx.fill();
ctx.font = '110px serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('☂️', 40, 90);
document.getElementById('appIcon').href = c.toDataURL();

const API_KEY = 'ErndoGHJSWG53aBhyRlhgw';
const NX = 62; // 송파구 격자 X
const NY = 124; // 송파구 격자 Y

// 한국 시간 기준으로 날짜/시간 구하기
function getKSTDate() {
  const now = new Date();
  const kst = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  const year = kst.getFullYear();
  const month = String(kst.getMonth() + 1).padStart(2, '0');
  const day = String(kst.getDate()).padStart(2, '0');
  const hours = kst.getHours();
  const minutes = kst.getMinutes();
  return { year, month, day, hours, minutes, kst };
}

// 기상청 단기예보 발표시간 계산 (02,05,08,11,14,17,20,23시)
function getBaseTime() {
  const { hours, minutes } = getKSTDate();
  const baseTimes = [2, 5, 8, 11, 14, 17, 20, 23];
  let baseHour = 23;
  for (let i = 0; i < baseTimes.length; i++) {
    if (hours < baseTimes[i] || (hours === baseTimes[i] && minutes < 10)) {
      baseHour = i === 0 ? 23 : baseTimes[i - 1];
      break;
    }
    baseHour = baseTimes[i];
  }
  return String(baseHour).padStart(2, '0') + '00';
}

function getBaseDate() {
  const { year, month, day, hours, minutes } = getKSTDate();
  // 0시~2시10분 사이면 전날 23시 발표 기준
  if (hours < 2 || (hours === 2 && minutes < 10)) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const ky = new Date(yesterday.toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
    return `${ky.getFullYear()}${String(ky.getMonth()+1).padStart(2,'0')}${String(ky.getDate()).padStart(2,'0')}`;
  }
  return `${year}${month}${day}`;
}

async function fetchWeather() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('result').style.display = 'none';
  document.getElementById('errorDiv').style.display = 'none';

  try {
    const baseDate = getBaseDate();
    const baseTime = getBaseTime();
    const { year, month, day } = getKSTDate();
    const todayStr = `${year}${month}${day}`;

    const url = `https://apihub.kma.go.kr/api/typ02/openApi/VilageFcstInfoService_2.0/getVilageFcst?pageNo=1&numOfRows=1000&dataType=JSON&base_date=${baseDate}&base_time=${baseTime}&nx=${NX}&ny=${NY}&authKey=${API_KEY}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error('API 오류');
    const data = await res.json();

    const items = data.response.body.items.item;
    if (!items) throw new Error('데이터 없음');

    // 오늘 날짜 데이터만 필터
    const todayItems = items.filter(item => item.fcstDate === todayStr);

    // 강수확률(POP) 최대값
    const popValues = todayItems.filter(i => i.category === 'POP').map(i => parseInt(i.fcstValue));
    const maxPop = popValues.length > 0 ? Math.max(...popValues) : 0;

    // 최고/최저기온
    const tmpValues = todayItems.filter(i => i.category === 'TMP').map(i => parseFloat(i.fcstValue));
    const tmxValues = todayItems.filter(i => i.category === 'TMX').map(i => parseFloat(i.fcstValue));
    const tmnValues = todayItems.filter(i => i.category === 'TMN').map(i => parseFloat(i.fcstValue));

    let tempMax = tmxValues.length > 0 ? Math.round(Math.max(...tmxValues)) : (tmpValues.length > 0 ? Math.round(Math.max(...tmpValues)) : '-');
    let tempMin = tmnValues.length > 0 ? Math.round(Math.min(...tmnValues)) : (tmpValues.length > 0 ? Math.round(Math.min(...tmpValues)) : '-');

    // 하늘상태(SKY), 강수형태(PTY) - 현재 시간에 가장 가까운 값
    const { hours } = getKSTDate();
    const curTime = String(hours).padStart(2, '0') + '00';
    const skyItems = todayItems.filter(i => i.category === 'SKY');
    const ptyItems = todayItems.filter(i => i.category === 'PTY');
    const curSky = skyItems.find(i => i.fcstTime >= curTime) || skyItems[0];
    const curPty = ptyItems.find(i => i.fcstTime >= curTime) || ptyItems[0];
    const skyVal = curSky ? parseInt(curSky.fcstValue) : 1;
    const ptyVal = curPty ? parseInt(curPty.fcstValue) : 0;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('result').style.display = 'block';

    const icon = document.getElementById('mainIcon');
    const statusText = document.getElementById('statusText');
    const subText = document.getElementById('subText');
    const card = document.getElementById('card');

    if (maxPop >= 50) {
      icon.textContent = '☂️';
      statusText.textContent = '오늘 비 올 수 있어요!';
      subText.textContent = `강수확률 최대 ${maxPop}% — 우산 꼭 챙기세요`;
      card.classList.add('rain-yes');
    } else if (maxPop >= 30) {
      icon.textContent = '🌂';
      statusText.textContent = '비가 올 수도 있어요';
      subText.textContent = `강수확률 최대 ${maxPop}% — 접이식 우산 챙기면 좋아요`;
      card.classList.remove('rain-yes');
    } else {
      icon.textContent = '☀️';
      statusText.textContent = '오늘은 우산 필요 없어요!';
      subText.textContent = `강수확률 최대 ${maxPop}% — 맑은 하루 되세요 😊`;
      card.classList.remove('rain-yes');
    }

    document.getElementById('probNum').textContent = maxPop + '%';
    const offset = 326.7 - (maxPop / 100) * 326.7;
    const ring = document.getElementById('ringFill');
    ring.style.strokeDashoffset = offset;
    ring.style.stroke = maxPop >= 50 ? '#4A90D9' : maxPop >= 30 ? '#7ec8f5' : '#5BC8A0';

    const weatherEmoji = getWeatherEmoji(ptyVal, skyVal);
    const weatherDesc = getWeatherDesc(ptyVal, skyVal);

    document.getElementById('weatherRow').innerHTML = `
      <div class="weather-item"><div class="wi-val">${tempMax}°</div><div class="wi-label">최고기온</div></div>
      <div class="weather-item"><div class="wi-val">${tempMin}°</div><div class="wi-label">최저기온</div></div>
      <div class="weather-item"><div class="wi-val">${weatherEmoji}</div><div class="wi-label">${weatherDesc}</div></div>`;

    const now = new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', hour: '2-digit', minute: '2-digit' });
    document.getElementById('updateTime').textContent = `${now} 기준 · 기상청 단기예보`;

  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('errorDiv').style.display = 'block';
    document.getElementById('errorMsg').textContent = '날씨 정보를 불러오지 못했어요. 잠시 후 다시 시도해주세요.\n(' + e.message + ')';
  }
}

function getWeatherEmoji(pty, sky) {
  if (pty === 1 || pty === 4) return '🌧️';
  if (pty === 2) return '🌨️';
  if (pty === 3) return '❄️';
  if (sky === 1) return '☀️';
  if (sky === 3) return '⛅';
  if (sky === 4) return '☁️';
  return '🌤️';
}

function getWeatherDesc(pty, sky) {
  if (pty === 1) return '비';
  if (pty === 2) return '비/눈';
  if (pty === 3) return '눈';
  if (pty === 4) return '소나기';
  if (sky === 1) return '맑음';
  if (sky === 3) return '구름많음';
  if (sky === 4) return '흐림';
  return '맑음';
}

fetchWeather();
</script>
</body>
</html>
